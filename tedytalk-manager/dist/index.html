  <body>
    <div id="root"></div>
    <div
      id="error-overlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 20px;
        overflow: auto;
        z-index: 99999;
      "
    >
      <h2 style="color: #ff6b6b; margin-top: 0">Application Error</h2>
      <pre id="error-overlay-content" style="white-space: pre-wrap"></pre>
      <button
        onclick="location.reload()"
        style="
          margin-top: 12px;
          padding: 8px 12px;
          border-radius: 6px;
          background: #ff6b6b;
          color: #fff;
          border: none;
        "
      >
        Reload
      </button>
    </div>
    <script>
      (function () {
        function showError(msg) {
          try {
            var overlay = document.getElementById("error-overlay");
            var content = document.getElementById("error-overlay-content");
            content.textContent = msg;
            overlay.style.display = "block";
          } catch (e) {
            console.error("Failed to show overlay", e);
          }
        }

        window.addEventListener("error", function (ev) {
          var message = ev.error
            ? ev.error.stack || ev.error.message || String(ev.error)
            : ev.message || "Unknown error";
          showError("Error: " + message);
        });

        window.addEventListener("unhandledrejection", function (ev) {
          var reason = ev.reason
            ? ev.reason.stack || ev.reason.message || String(ev.reason)
            : "Unhandled rejection";
          showError("Unhandled Rejection: " + reason);
        });
      })();
    </script>
  </body>
